<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COMO CHEGAR</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e5e5e5;
display:flex;
justify-content:center;
}

.topo{
background:#6d1f2b;
height:180px;
width:100%;
position:absolute;
top:0;
}

.card{
margin-top:120px;
background:white;
width:350px;
border-radius:25px;
padding:40px 25px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
position:relative;
}

.logo{
width:90px;
height:90px;
border-radius:60%;
background:#6d1f2b;
position:absolute;
top:-45px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
justify-content:center;
border:6px solid white;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

h1{
font-size:20px;
margin-top:30px;
color:#5c1f33;
}

.endereco{
margin-top:15px;
font-size:16px;
color:#333;
}

.botao{
display:block;
text-decoration:none;
background:#e7d6a5;
padding:15px;
border-radius:30px;
margin-top:20px;
color:#6d1f2b;
font-weight:bold;
}
  
.mapa{
position:relative;
width:100%;
padding-bottom:75%;
margin-top:15px;
border-radius:15px;
overflow:hidden;
}

.mapa iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}
</style>
  
</head>

<body>

<div class="topo"></div>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>COMO CHEGAR</h1>

<p class="endereco">
Rua Aquidaban, 714, Figueira's office, sala 59 - Centro, Rio Grande - RS
</p>

<div class="mapa">
<iframe 
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3060.874665150163!2d-52.10731652465378!3d-32.03199612628043!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95119c07e3d5159d%3A0xb65fb1e16bcc8441!2sLuis%20PPCI%20-%20Servi%C3%A7os%20de%20preven%C3%A7%C3%A3o%20contra%20inc%C3%AAndio!5e1!3m2!1spt-BR!2sbr!4v1776951272321!5m2!1spt-BR!2sbr"

</div>

</div>
