<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Endereço - LUIS PPCI</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e5e5e5;
display:flex;
justify-content:center;
}

.topo{
background:#6d1f2b;
height:180px;
width:100%;
position:absolute;
top:0;
}

.card{
margin-top:120px;
background:white;
width:350px;
border-radius:25px;
padding:40px 25px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
position:relative;
}

.logo{
width:90px;
height:90px;
border-radius:60%;
background:#6d1f2b;
position:absolute;
top:-45px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
justify-content:center;
border:6px solid white;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

h1{
font-size:20px;
margin-top:30px;
color:#5c1f33;
}

.endereco{
margin-top:15px;
font-size:16px;
color:#333;
}

iframe{
border-radius:15px;
margin-top:15px;
}

.botao{
display:block;
text-decoration:none;
background:#e7d6a5;
padding:15px;
border-radius:30px;
margin-top:20px;
color:#6d1f2b;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topo"></div>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>ENDEREÇO</h1>

<p class="endereco">
COLOQUE SEU ENDEREÇO AQUI
</p>

<!-- MAPA VAI AQUI -->

<a class="botao" href="#">
ABRIR NO GOOGLE MAPS
</a>

</div>

</body>
</html>
